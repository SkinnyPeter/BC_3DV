seed: 42

paths:
  raw_dir: data/raw
  processed_dir: data/processed
  splits_file: data/processed/splits.json
  metadata_file: data/processed/metadata.json
  index_cache_file: data/processed/index_cache.json

h5:
  file_glob: "*.h5"
  treat_each_file_as_episode: true

keys:
  image_keys:
    - "observations/images/aria_rgb_cam/color"
    - "observations/images/oakd_front_view/color"
  proprio_keys:
    - "observations/qpos_arm_left"
    - "observations/qpos_arm_right"
  action_keys:
    - "actions_arm_left"
    - "actions_arm_right"

fallback:
  derive_action_if_missing: true
  derived_action_mode: "state_delta"  # state_delta

image:
  resize_hw: [128, 128]
  to_float32: true
  normalize: true
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

sequence:
  frame_stack: 1
  action_chunk: 8
  action_stride: 1

split:
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1
  split_seed: 42

loader:
  num_workers: 4
  pin_memory: true
  persistent_workers: true
